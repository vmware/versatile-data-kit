components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DataJobApiInfo:
      description: API and Data Job service information
      required:
        - api_version
      type: object
      properties:
        api_version:
          description: ''
          type: string
      example:
        api_version: 1.0.0

    DataJobSummary:
      description: Data DataJob summary
      required:
        - job_name
        - team
        - description
      type: object
      properties:
        job_name:
          description: DataJob Name
          type: string
          example: starshot-processing-vmc-fact-daily
        team:
          description: Team name
          type: string
          example: starshot
        description:
          description: Description
          type: string
          example: Data Job responsible for transforming vmc realted fact tables on daily basis
        source_url:
          description: Link to source code
          type: string

    DataJob:
      description: Data Job Details.
      required:
        - job_name
        - description
        - config
      type: object
      properties:
        job_name:
          description: DataJob Name
          type: string
          example: starshot-processing-vmc-fact-daily
        description:
          description: Short DataJob description.
          type: string
          example: Data Job responsible for transforming vmc realted fact tables on daily basis
        config:
          $ref: '#/components/schemas/DataJobConfig'
        team:
          description: (Optional) Team name.
          type: string
          example: starshot (Optional property)

    Error:
      description: Contains description for one or more errors detected.
      required:
        - messages
      type: object
      properties:
        messages:
          description: Error messages.
          type: array
          items:
            type: string
          example:
            - Data Job starshot-processing-vmc-fact-daily not found.

    DataJobDeployment:
      description: A Deployment of the DataJob.
      type: object
      properties:
        vdk_version:
          description: A specific VDK version to use.
          type: string
          example: 2.1
        job_version:
          description: Job version (can be git commit).
          type: string
          example: 11a403ba
        mode:
          $ref: '#/components/schemas/DataJobMode'
        id:
          $ref: '#/components/schemas/DataJobDeploymentId'
        enabled:
          description: Enable/disable flag.
          type: boolean
          example: false
          default: true
        deployed_by:
          description: User or service that deployed the data job
          type: string
          example: auserov@vmware.com
        deployed_date:
          description: The data job deployment date
          type: string
          format: date-time
        schedule:
          $ref: '#/components/schemas/DataJobSchedule'
        resources:
          $ref: '#/components/schemas/DataJobResources'

    DataJobDeploymentStatus:
      description: A Deployment Status of the DataJob, whick includes information such as last deployment date, and who deployed the data job.
      type: object
      properties:
        vdk_version:
          description: A specific VDK version to use.
          type: string
          example: 2.1
        job_version:
          description: Job version (can be git commit).
          type: string
          example: 11a403ba
        mode:
          $ref: '#/components/schemas/DataJobMode'
        id:
          $ref: '#/components/schemas/DataJobDeploymentId'
        enabled:
          description: Enable/disable flag.
          type: boolean
          example: false
          default: true
        contacts:
          $ref: '#/components/schemas/DataJobContacts'
        schedule:
          $ref: '#/components/schemas/DataJobSchedule'
        resources:
          $ref: '#/components/schemas/DataJobResources'
        last_deployed_date:
          description: The date and time in UTC of last deployment of the data job deployment.
          type: string
          example: 2021-02-02T10:50:40.034Z
          default: null
        last_deployed_by:
          description: The username of the user who modified the data job last.
          type: string
          example: jdoe
          default: null


    DataJobExecutionRequest:
      description: Request to start execution of Data Job. The job must have been deployed before that (see Deployment API) and will run its latest version
      type: object
      properties:
        started_by:
          description: user or service that started the execution (e.g manual/auserov@vmware.com or scheduled/runtime)
          type: string
          example: schedule/runtime
        args:
          description: Data Job arguments
          type: object
          additionalProperties: true
          example:
            key: value

    DataJobExecution:
      description: Executions of a Data Job.
      type: object
      properties:
        id:
          description: Data Job Execution ID
          type: string
          example: starshot-processing-vmc-fact-daily-2018623174356
        job_name:
          description: Data Job name
          type: string
          example: starshot-processing-vmc-fact-daily
        status:
          description: The current status.
          enum:
            - submitted
            - running
            - finished
            - failed
            - cancelled
            - skipped
          type: string
          example: submitted
        type:
          description: Execution type - manual or scheduled
          enum:
            - manual
            - scheduled
          type: string
          example: scheduled
        start_time:
          description: Start of execution
          type: string
          format: date-time
        end_time:
          description: Start of execution
          type: string
          format: date-time
        started_by:
          description: user or service that started the execution (e.g manual/auserov@vmware.com or scheduled/runtime)
          type: string
          example: schedule/runtime
        message:
          description: Message (usually error) during execution
          type: string
          example:
        op_id:
          description: Operation id used for tracing calls between different services
          type: string
        deployment:
          $ref: '#/components/schemas/DataJobDeployment'

    DataJobProperties:
      description: Properties of a Data Job.
      type: object
      additionalProperties:
        type: object
      example:
        redshift-user: foo
        redshift-password: bar
        last-execution-time: 1585303338

    Enable:
      description: Enable or disable an App or a Deployment.
      required:
        - enabled
      type: object
      properties:
        enabled:
          description: Enable/disable flag.
          type: boolean

    DataJobMode:
      description: Execution mode the data job is deployed. Data Jobs used for dev or testing purposes are marked as testing.
        This is used by Opeartion team when rollout platform and infrastructure changes - they are first roll out to the testing jobs and only after confirming it;s ok - to the release jobs. Also testing and release jobs may have different limits and SLA targets.
      enum:
        - testing
        - release
      type: string
      example: release

    DataJobDeploymentId:
      description: |
        String that identifies a single deployment of a Data Job.
        Currently only single deployment per Data Job is possible. In the future:
        It's recommended to use following ids - development, testing, production.
        But users are free to come up with their own.
        For example - this enables create with same Data Job code 3 different deployment:
        development  deployment  --deployment-id development
        testing deployment  --deployment-id testing
        production deployment  --deployment-id prod
      type: string
      example: release

    DataJobResources:
      description: Resource cofiguration of a data DataJob Deployment.
      type: object
      properties:
        cpu_request:
          format: float
          description: Initial CPU shares in deciCores (1 dCore = 0.1 Core = 100 mCores)
          type: number
          example: 10
        cpu_limit:
          format: float
          description: Max CPU shares in deciCores (1 dCore = 0.1 Core = 100 mCores)
          type: number
          example: 20
        memory_request:
          format: int32
          description: Initial Memory in MiB.
          type: integer
          example: 1024
        memory_limit:
          format: int32
          description: Max Memory in MiB.
          type: integer
          example: 2048

    DataJobConfig:
      description: DataJob configuration properties.
      type: object
      properties:
        db_default_type:
          example: IMPALA
          description: |
            Default DB connection provided for the job. Can be either 'IMPALA' or 'REDSHIFT'.
            Note: 'REDSHIFT' is deprecated.
          type: string
        contacts:
          $ref: '#/components/schemas/DataJobContacts'
        schedule:
          $ref: '#/components/schemas/DataJobSchedule'
          deprecated: true
        generate_keytab:
          example: false
          description: |
            Enable Disable flag for generating secret with keytab
          type: boolean
          default: true
        enable_execution_notifications:
          example: false
          description: |
            (Optional) Specifies whether to dispatch email notifications per data job execution.
          type: boolean
          default: true
        notification_delay_period_minutes:
          format: int32
          description: |
            (Optional) Specifies the time (in minutes) a job execution is allowed to be delayed from
            its schedule before an alert is triggered.
            The value of this property for each data job is exposed as a Prometheus metrics by the service
            at the /data-jobs/debug/prometheus endpoint. This metrics (taurus_datajob_notification_delay)
            is subsequently used in the JobDelay Prometheus rule to generate the alerts.
          type: integer
          example: 60
          default: 240


    DataJobSchedule:
      description: Schedule configuration
      type: object
      properties:
        schedule_cron:
          example: 0 0 13 * 5
          description: |
            For format see https://en.wikipedia.org/wiki/Cron
            The cron expression is evaluated in UTC time.
            If it is time for a new job run and the previous job run hasnt finished yet, the cron job kills and replaces the currently running job run with a new job run.
            Jobs configured to run more often than once per hour are not supported and their schedule may be overridden by the platform.
            To distribute load evenly, Administrators may override the minute you specified.
            Use https://crontab.guru for help.
          type: string

    DataJobContacts:
      description: Data Job contacts
      type: object
      properties:
        notified_on_job_failure_user_error:
          description: |
            list of email addresses to be notified on job execution failure caused by user code or user configuration problem.
            For example: if the job contains an SQL script with syntax error.
          type: array
          items:
            type: string
          example:
            - starshot_ops@vmware.com
            - auserov@vmware.com
        notified_on_job_failure_platform_error:
          description: |
            list of email addresses to be notified on job execution failure caused by a platform problem.
          type: array
          items:
            type: string
          example:
            - starshot_ops@vmware.com
            - auserov@vmware.com
        notified_on_job_success:
          description: |
            list of email addresses to be notified on job execution success.
          type: array
          items:
            type: string
          example:
            - auserov@vmware.com
        notified_on_job_deploy:
          description: |
            list of email addresses to be notified of job deployment outcome.
          type: array
          items:
            type: string
          example:
            - auserov@vmware.com

    DataJobVersion:
      description: Data Job version
      required:
        - version_sha
      type: object
      properties:
        version_sha:
          description: sha which specifies the latest deployed version of the data job
          type: string
      example:
        version_sha: 17012900f60461778c01ab24728807e70a5f2c87
    DataJobQueryResponseWithError:
      description: Query response containing Data Jobs
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
          description: Errors while making query (validation errors, exceptions, etc)
          example:
            application/json: [
               {
                 "message": "Validation error of type FieldUndefined",
                 "locations": [],
                 "description": "Field 'someField' in type 'DataJob' is undefined",
                 "validationErrorType": "FieldUndefined",
                 "queryPath": [
                   "jobs",
                   "content",
                   "someField"
                 ],
                 "extensions": null,
                 "errorType": "ValidationError",
                 "path": null
               }
             ]
        data:
          $ref: '#/components/schemas/DataJobPage'
    DataJobQueryResponse:
      description: Query response containing Data Jobs
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
          description: Errors while making query (validation errors, exceptions, etc)
        data:
          $ref: '#/components/schemas/DataJobPage'
    DataJobPage:
      description: Page object containing Data Jobs list with information for total elements and pages
      type: object
      properties:
        content:
          type: array
          items:
            type: object
          example:
            application/json: [
              {
                "jobName": "starshot-processing-vmc-fact-daily",
                "config": {
                  "team": "starshot",
                  "description": "Data Job responsible for transforming vmc realted fact tables on daily basis",
                  "schedule": {
                    "scheduleCron": "5 0 * 8 *",
                    "nextRun": 1618914371
                  },
                  "sourceUrl": "https://github.com/product-analytics/data-jobs/tree/master/starshot-processing-vmc-fact-daily",
                  "contacts": {
                    "notifiedOnJobFailureUserError": "[starshot_ops@vmware.com]",
                    "notifiedOnJobFailurePlatformError": "[starshot_ops@vmware.com, auser@vmware.com]",
                    "notifiedOnJobSuccess": "[starshot_ops@vmware.com]",
                    "notifiedOnJobDeploy": "[starshot_ops@vmware.com, auser@vmware.com]"
                  }
                }
              },
              ...
            ]
        totalItems:
          description: Number of elements which meet the given query requirement
          type: integer
          example: 100
        totalPages:
          description: Number of pages with elements which meet the given query requirement
          type: integer
          example: 5

  responses:
    Info:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobApiInfo'
      description: API and Data Jobs service information
    DataJob:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJob'
      description: Data Job details.
    Error:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: A response for any errors detected.
    DeploymentArray:
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DataJobDeploymentStatus'
      description: A list of data job deployments.
    Deployment:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobDeploymentStatus'
      description: Deployment properties.
    DataJobConfig:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobConfig'
      description: DataJob custom configuration.
    ExecutionArray:
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DataJobExecution'
      description: Data Job Executions.
    Execution:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobExecution'
      description: Deployment properties.
    Properties:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobProperties'
      description: Data Job Properties.
    Source:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobVersion'
      description: Data Job version.
    DataJobQueryResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobQueryResponse'
      description: Data Job query response.
    DataJobQueryResponseWithError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataJobQueryResponseWithError'
      description: Data Job query response with error.

security:
  - bearerAuth: []

tags:
  - name: Data Jobs
  - name: Data Jobs Deployment
    description: |
      Data Job Deployment takes both the Data Job Code/Build and the deploy specific Properties and is ready for immediate execution in the execution environment. <br>
      Data Job Code/Build - all python, SQL files, and requirements.txt of the Data Job.
      NOTE: deploymentID and mode are not implemented so they are ignored.
  - name: Data Jobs Execution
    description: Experimental API for managing Data Job Execution. An instance of a running data job deployment is called an execution.
  - name: Data Jobs Properties
    description: |
      Any saved state, configuration, and secrets of a Data Job. Those are tracked per deployment.
      not implemented yet: Properties are versioned so all changes are tracked (when, who - opid or user)
  - name: Data Jobs Service
  - name: Data Jobs Sources
