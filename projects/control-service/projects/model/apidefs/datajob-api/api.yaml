openapi: 3.0.0
info:
  title: Taurus Data Jobs
  version: '1.0'
  description: |
    The Taurus Data Jobs internal and Control Plane API.
    Data Jobs allows Data Engineers to implement automated pull ingestion (E in ELT)
    and batch data transformation into Data Warehouse (T in ELT).
    See also https://github.com/vmware/versatile-data-kit/wiki/Introduction

    The API has resource-oriented URLs, JSON-encoded responses, and uses standard HTTP response codes, authentication, and verbs.
    The API enables creating, deploying, managing and executing Data Jobs in runtime environment.<br>
    <br>
    The API reflects the usual Data Job Development lifecycle:<br>
    <li> Create a new data job (webhook to further configure job -e.g authorize its createion, setup permissions, etc).
    <li> Download keytab. Develop and run the data job locally.
    <li> Deploy data job in cloud runtime enviornment to run on scheduled basis.
    <br><br>
    If Authentication is required pass OAuth2 access token in http header 'Authorization: Bearer [access-token-here]'

    The API promotes some best practices (inspired by https://12factor.net ):
    <li> Explicitly declare and isolate dependencies
    <li> Strict separation of config from code. Config varies substantially across deploys, code does not.
    <li> Separation between the build, release/deploy, and run stages
    <li> Data Jobs are stateless and share-nothing processes. Any data that needs to persist must be stored in a stateful backing service (e.g IProperties).
    <li> Implementation is assumed to be be atomic and idempotent - should be OK for a job to fail somewhere in the middle; subsequent restart should not cause data corruption.
    <li> Keep development, staging, and production as similar as possible
    <br><br>
    <b>API Evolution</b><br>
    In the following sections, there are some terms that have a special meaning in the context of the APIs.
    <br><br>
    <li> <i>Stable</i> - The implementation of API has been battle-tested (has been in production for some time - probably at least a month)
                         API is subject to the semantic versioning model and will follow
                         deprecation policy
    <li> <i>Experimental</i> - May disappear without notice and is not subject to semantic versioning
                               Implementation of the API is not considered stable nor well tested.
                               Generally this is given to clients to experiment within testing environment. Must not be used in Production.
    <li> <i>Deprecated</i> - API is expected to be removed within next one or two major version upgrade.
                             The deprecation notice/comment will say when the API will be removed and what alternatives should be used instead.

paths:

  '/data-jobs/for-team/{team_name}/info':
    get:
      tags:
        - Data Jobs Service
      responses:
        '200':
          $ref: '#/components/responses/Info'
      operationId: info
      summary: Get API and Data Jobs Service info
      description: <i>(Introduced in v1.0)</i> | Get API and Data Jobs service information
      parameters:
        -  name: team_name
           description: Team Name
           schema:
             type: string
           in: path
           required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}':
    summary: |
      Data Job is a sequence of python or sql scripts and configuration and executed by Versatile Data Kit SDK.
      See more in https://github.com/vmware/versatile-data-kit/wiki/Getting-Started
    get:
      deprecated: true
      tags:
        - Data Jobs
      responses:
        '200':
          $ref: '#/components/responses/DataJob'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobReadDeprecated
      summary: Retrieves details of an existing Data Job by specifying the name of the Data Job. | (Stable)
      description: <i>(Introduced in v1.0)</i>
    put:
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataJob'
        required: true
      tags:
        - Data Jobs
      responses:
        '201':
          description: Created successfully.
        '204':
          description: Updated successfully.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobUpdateDeprecated
      summary: Update Data Job. | (Stable)
      description: <i>(Introduced in v1.0)</i>
    delete:
      deprecated: true
      tags:
        - Data Jobs
      responses:
        '200':
          description: Deleted successfully.
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobDeleteDeprecated
      summary: Delete data Data Job | (Stable)
      description: |
        <i>(Introduced in v1.0)</i> | Delete data Data Job including all its state (properties) and any deployments.
        Currently executing Data Jobs will be left to finish.
    parameters:
      - name: team_name
        description: Team Name
        schema:
          type: string
        in: path
        required: true
      - name: job_name
        description: Data Job Name
        schema:
          type: string
        in: path
        required: true

  '/data-jobs/for-team/{team_name}':
    post:
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataJob'
        required: true
      parameters:
        - name: team_name
          description: The Team which owns the Data Job
          schema:
            type: string
          in: path
          required: true
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: The Name of the Data Job
      tags:
        - Data Jobs
      responses:
        '201':
          description: Created successfully.
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      operationId: dataJobCreateDeprecated
      summary: Creates a new Data Job | (Stable)
      description: |
        <i>(Introduced in v1.0)</i> | Creates a new Data Job.<br>
        The name of the Data job should comply to the following naming convention:<br>
        <li>should start with a letter
        <li>less than 50 characters
        <li>more than 5 characters
        <li>contain only lowercase alphanumeric symbols and dash [a-z0-9\-]
        <br><br>
        When succesfully created clients can download keytab associated with the Data Job to run it locally.<br>
        To deploy so that it can be executed reguarly in runtime use /data-jobs/for-team/{team_name}/jobs/{job_name}/deployments API.

  '/data-jobs/for-team/{team_name}/jobs':
    get:
      operationId: jobsQuery
      summary: List Data Jobs  | (Experimental)
      tags:
        - Data Jobs
      description: |
        List data Jobs with GraphQL like query. By choosing which field to be returned you can control the output.
        You can learn more about the GraphQL queries by visiting [GraphQL official website](https://graphql.org/learn/queries/)
        Query should be provided as GET parameter, not by POST body. Don't worry about the spaces and tabs
        Keep in mind that each aditional field <b>could make query response time slower, for instance deployments</b>,
        it's best if you request only what you need <br/><br/>

        The <b>pageNumber</b> and <b>pageSize</b> arguments are required! Page number should be a <b>number greater than 1</b>,
        and pageSize <b>should be between 1 and 100 results</b> (per page)
        Check the latest example for the full list of supported query fields.<br/><br/>

        Simplest query that you could make is to fetch the job names
        <pre>
        {<br/>
          jobs(pageNumber: 1, pageSize: 25) {<br/>
            content {<br/>
              jobName<br/>
            }<br/>
          }<br/>
        }<br/>
        </pre><br/>

        You could also use filtering and sorting function. Filter object has <b>property, pattern and sort</b> fields.<br/>
        * <b>property</b> points out which field you want to filter, if you point out some other field that is not supported,
        an invalid response will be return.<br/>
        * <b>pattern</b> should be a non-empty string which the provided property should contains [ignoring cases], for instance: `starshot` pattern will match
        <b>import-starshot-sql, StarShot-servers and notify-starshot</b> job names, but it won't match <b>stars-shot-daily-prune`</b>
        If a pattern string is not provided, then you must atleast provide the property field<br/>
        * <b>sort</b> should be an enum value - ASC (ascending) or DESC (descending) option [not required, default is ASC]
        Multiple filters could be applied, but <b>maximum one should contain sorting</b>!
        <pre>
        {<br/>
          jobs(<br/>
            pageNumber: 1,<br/>
            pageSize: 25,<br/>
            filter: [{<br/>
              property: "jobName",<br/>
              pattern: "starshot",<br/>
              sort: "DESC"<br/>
            }],<br/>
          ) {<br/>
            content {<br/>
              jobName<br/>
            }<br/>
          }<br/>
        }<br/>
        </pre><br/>

        You could also search for a string into the properties that you are requesting, for instance:
        This query will search for job names, team names and descriptions which contains the provided "starshot" string
        <pre>
        {<br/>
          jobs(<br/>
            pageNumber: 1,<br/>
            pageSize: 25,<br/>
            search: "starshot"<br/>
          ) {<br/>
            content {<br/>
              jobName,<br/>
              config {<br/>
                team<br/>
                description<br/>
              }<br/>
            }<br/>
          }<br/>
        }<br/>
        </pre><br/>

        Full example of currently available for fetching fields. Note that if you combine searching and filtering, first
        it will apply filters and then within filtered jobs it will apply the search, vice versa is currently not supported:
        <pre>
        {<br/>
          jobs(<br/>
            pageNumber: 1,<br/>
            pageSize: 25,<br/>
            search: "daily",<br/>
            filter: [{<br/>
              property: "jobName",<br/>
              pattern: "import-sql",<br/>
            },{<br/>
              property: "team",<br/>
              pattern: "starshot",<br/>
              sort: "DESC" <br/>
            },{<br/>
              property: "deployments.enabled",<br/>
              pattern: "enabled",<br/>
            }],<br/>
          ) {<br/>
            content {<br/>
              jobName<br/>
              config {<br/>
                team<br/>
                description<br/>
                sourceUrl<br/>
                schedule {<br/>
                  scheduleCron<br/>
                  nextRunEpochSeconds<br/>
                }<br/>
                contacts {<br/>
                  notifiedOnJobFailureUserError<br/>
                  notifiedOnJobFailurePlatformError<br/>
                  notifiedOnJobSuccess<br/>
                  notifiedOnJobDeploy<br/>
                }<br/>
              }<br/>
              deployments {<br/>
                id<br/>
                enabled<br/>
                jobVersion<br/>
                mode<br/>
              }<br/>
            }<br/>
            totalPages<br/>
            totalItems<br/>
            }<br/>
          }<br/>
        }<br/>
        </pre><br/>

      parameters:
        - name: team_name
          description: The Team which owns the Data Job
          schema:
            type: string
          in: path
          required: true
        - name: query
          description: Request a GraphQL-like query.
          schema:
            type: string
            example: |
              {
                jobs(pageNumber: 1, pageSize: 20, filter: []) {
                  content {
                    jobName
                    config {
                      team
                      description
                      schedule {
                        scheduleCron
                        nextRunEpochSeconds
                      }
                      sourceUrl
                      contacts {
                        notifiedOnJobFailureUserError
                        notifiedOnJobFailurePlatformError
                        notifiedOnJobSuccess
                        notifiedOnJobDeploy
                      }
                    }
                  }
                  totalPages
                  totalItems
                }
              }
            default: |
              {
                jobs(pageNumber: 1, pageSize: 20, filter: []) {
                  content {
                    jobName
                    config {
                      team
                      description
                      schedule {
                        scheduleCron
                      }
                    }
                  }
                  totalPages
                  totalItems
                }
              }
          required: false
          in: query
        - name: operation_name
          description: If the query is specified and contains several named operations, an operation_name query parameter can be used to control which one should be executed
          schema:
            type: string
            example: jobs
          required: false
          in: query
        - name: variables
          description: If query is specified then variables can be sent as a JSON-encoded string in an additional query parameter called variables
          schema:
            type: string
            example: |
              {
                "pageSize": "10",
                "pageNumber": "1"
              }
          required: false
          in: query
      responses:
        '200':
          $ref: '#/components/responses/DataJobQueryResponse'
        '400':
          $ref: '#/components/responses/DataJobQueryResponseWithError'
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataJob'
        required: true
      parameters:
        - name: team_name
          description: The Team which owns the Data Job
          schema:
            type: string
          in: path
          required: true
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: The Name of the Data Job
      tags:
        - Data Jobs
      responses:
        '201':
          description: Created successfully.
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      operationId: dataJobCreate
      summary: Creates a new Data Job | (Stable)
      description: |
        <i>(Introduced in v1.0)</i> | Creates a new Data Job.<br>
        The name of the Data job should comply to the following naming convention:<br>
        <li>should start with a letter
        <li>less than 50 characters
        <li>more than 5 characters
        <li>contain only lowercase alphanumeric symbols and dash [a-z0-9\-]
        <br><br>
        When succesfully created clients can download keytab associated with the Data Job to run it locally.<br>
        To deploy so that it can be executed reguarly in runtime use /data-jobs/for-team/{team_name}/jobs/{job_name}/deployments API.

  '/data-jobs/for-team/{team_name}/name/{job_name}/deployments':
    summary: |
      Deployments are requests to deploy a specific (code) version of a Data Job to be executed in runtime (kubernetes) .
      Users can deploy the same (code) version of a Data Job with different properties.
      Currently deployment_id and mode are not implemented. Only a single active deployment of a job is possible.
    get:
      deprecated: true
      tags:
        - Data Jobs Deployment
      parameters:
        - name: deployment_id   # Ignored. Only one deployment currently supported
          description: Get the Deployment with this id (e.g production, staging, dev)
          schema:
            type: string
          in: query
        - name: mode     # Ignored. Only one mode currently supported
          description: Get Deployments only for this mode.
          schema:
            $ref: '#/components/schemas/DataJobMode'
          in: query
      responses:
        '200':
          $ref: '#/components/responses/DeploymentArray'
        '404':
          $ref: '#/components/responses/Error'
      operationId: deploymentListDeprecated
      summary: Get Data Job deployments. | (Stable)
      description: <i>(Introduced in v1.0)</i>
    post:
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataJobDeployment'
      parameters:
        - name: send_notification
          description: |
            Allows administrators to disable sending notification during maintance window for platfrom errors -
            e.g if all jobs are being re-deployed due to migration or after recovering from an outage.
            Monitoring data will still be popoulated so deployment status can be monitored by admins.
          schema:
            type: boolean
            default: True
          required: false
          in: query
      tags:
        - Data Jobs Deployment
      responses:
        '202':
          description: Update accepted successfully.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      operationId: deploymentUpdateDeprecated
      summary: Creates or updates a deployment of a Data Job. | (Stable)
      description: |
        <i>(Introduced in v1.0)</i> | Creates or updates a deployment of a Data Job.
        The API returns before the actual Job is deployed.
        Depending on settings specified during Data Job creation clients will get an mail in case of success or failure of the deployment.
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: DataJob Name.
        schema:
          type: string
        in: path
        required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}/deployments/{deployment_id}':
    summary: Manage single deployment
    get:
      deprecated: true
      tags:
        - Data Jobs Deployment
      responses:
        '200':
          $ref: '#/components/responses/Deployment'
        '404':
          $ref: '#/components/responses/Error'
      operationId: deploymentReadDeprecated
      summary: Get Data Job deployments. | (Stable)
      description: <i>(Introduced in v1.0)</i>
    delete:
      deprecated: true
      tags:
        - Data Jobs Deployment
      responses:
        '202':
          description: Deletion accepted successfully.
        '404':
          $ref: '#/components/responses/Error'
      operationId: deploymentDeleteDeprecated
      summary: |
        Delete Deployment of a Data Job.
        Currently executing Data Job will be left to finish.  | (Stable)
      description: <i>(Introduced in v1.0)</i>
    patch:
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Enable'
        required: true
      tags:
        - Data Jobs Deployment
      responses:
        '202':
          description: Update accepted successfully.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      operationId: deploymentEnableDeprecated
      summary: Enable/disable the deployment of a Data Job. When disabled Data Job will not be executed. | (Stable)
      description: <i>(Introduced in v1.0)</i>
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: Data job Name.
        schema:
          type: string
        in: path
        required: true
      - name: deployment_id     # Only a single deployment. Can pass 'dummy' for now.
        description: Data job deployment id.
        schema:
          $ref: '#/components/schemas/DataJobDeploymentId'
        in: path
        required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}/executions':
    summary: Execution API is used to query recent executions of Data Jobs and to trigger new executions.
    get:
      deprecated: true
      tags:
        - Data Jobs Execution
      responses:
        '200':
          $ref: '#/components/responses/ExecutionArray'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobExecutionListDeprecated
      summary: Get Data Jobs (recent) executions. (the whole Execution API is still experimental and must not be used in production) | (Experimental)
      description: <i>(Introduced in v1.0)</i>
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: DataJob Name.
        schema:
          type: string
        in: path
        required: true
      - name: execution_status
        description: Execution status
        schema:
          type: array
          items:
            type: string
        example: submitted
        in: query

  '/data-jobs/for-team/{team_name}/name/{job_name}/deployments/{deployment_id}/executions':
    summary: Execution API is used to query recent executions of Data Jobs and to trigger new executions.
    get:
      deprecated: true
      tags:
        - Data Jobs Execution
      responses:
        '200':
          $ref: '#/components/responses/ExecutionArray'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobDeploymentExecutionListDeprecated
      summary: Get Data Jobs (recent) executions. | (Experimental)
      description: <i>(Introduced in v1.0)</i>
      parameters:
        - name: execution_status
          description: Execution status
          schema:
            type: array
            items:
              type: string
          example: submitted
          in: query
    post:
      deprecated: true
      tags:
        - Data Jobs Execution
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataJobExecutionRequest'
      responses:
        '202':
          description: Execution triggered successfully.
          headers:
            Location:
              description: URI of the execution
              schema:
                type: string
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      operationId: dataJobExecutionStartDeprecated
      summary: Trigger Data Job Execution. | (Experimental)
      description: |
        <i>(Introduced in v1.0)</i> | Trigger new execution of a Data Job.
        If Data Job deployment is currently being executed it will return an error (409 Conflict).
        Only deployed Data Jobs can be executed. Currently the Data Job arguments ('args') are ignored.
        TODO in the future it will be possible to trigger different deployments.
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: DataJob Name.
        schema:
          type: string
        in: path
        required: true
      - name: deployment_id
        description: Data job deployment id. Currently it is being ignored as multiple deployments are not implemented.
        schema:
          $ref: '#/components/schemas/DataJobDeploymentId'
        in: path
        required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}/executions/{execution_id}':
    summary: Data Job Execution details.
    get:
      deprecated: true
      tags:
        - Data Jobs Execution
      responses:
        '200':
          $ref: '#/components/responses/Execution'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobExecutionReadDeprecated
      summary: Get Data Job Execution details. | (Experimental)
      description: <i>(Introduced in v1.0)</i>
    delete:
      deprecated: true
      tags:
        - Data Jobs Execution
      responses:
        '200':
          description: Canceled execution successfully.
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobExecutionCancelDeprecated
      summary: Cancel (if running) Data Job Execution | (Experimental)
      description: <i>(Introduced in v1.0)</i> | Cancel execution of a Data Job with given execution id.
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: DataJob Name.
        schema:
          type: string
        in: path
        required: true
      - name: execution_id
        description: Execution ID.
        schema:
          type: string
        in: path
        required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}/keytab':
    summary: |
      List of credentials to be used by data job - for example kerberos key to authenticate to Database.
      TODO: rename to /credentials perhaps as it seems more clear/generic
    get:
      deprecated: true
      tags:
        - Data Jobs
      responses:
        '200':
          description: Success
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobKeytabDownloadDeprecated
      summary: Get data job keytab. | (Stable)
      description: <i>(Introduced in v1.0)</i>
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: DataJob Name.
        schema:
          type: string
        in: path
        required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}/deployments/{deployment_id}/properties':
    summary: |
      Data Job properties API.
      Currently they are not implemented in Taurus.
    get:
      deprecated: true
      tags:
        - Data Jobs Properties
      responses:
        '200':
          $ref: '#/components/responses/Properties'
      operationId: dataJobPropertiesReadDeprecated
      summary: Get Data Job properties.
      description: <i>(Introduced in v1.0)</i>
    put:
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataJobProperties'
        required: true
      tags:
        - Data Jobs Properties
      responses:
        '201':
          description: Created successfully.
        '204':
          description: Updated successfully.
      operationId: dataJobPropertiesUpdateDeprecated
      summary: Update Data Job properties.
      description: <i>(Introduced in v1.0)</i>
    parameters:
      -  name: team_name
         description: Team Name
         schema:
           type: string
         in: path
         required: true
      - name: job_name
        description: DataJob Name.
        schema:
          type: string
        in: path
        required: true
      - name: deployment_id
        description: Data job deployment id.
        schema:
          $ref: '#/components/schemas/DataJobDeploymentId'
        in: path
        required: true

  '/data-jobs/for-team/{team_name}/name/{job_name}/team/{new_team}':
    put:
      deprecated: true
      tags:
        - Data Jobs
      responses:
        '200':
          description: Team changed successfully.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      operationId: dataJobTeamUpdateDeprecated
      summary: Update API for Data Jobs team | (Stable)
      description: <i>(Introduced in v1.0)</i> | Update API for Data Jobs team
      parameters:
        -  name: team_name
           description: Current Team Name.
           schema:
             type: string
           in: path
           required: true
        -  name: new_team
           description: New Team Name.
           schema:
             type: string
           in: path
           required: true
        - name: job_name
